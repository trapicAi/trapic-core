# Copy this file and fill in real passwords:
#   cp mariadb-secret.example.yaml mariadb-secret.yaml
#   kubectl apply -f mariadb-secret.yaml
#
# DO NOT commit mariadb-secret.yaml to version control.
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
  namespace: trapic
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: "<CHANGE_ME>"
  MARIADB_PASSWORD: "<CHANGE_ME>"
